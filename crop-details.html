<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Details - AgroSystem</title>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* ==========================================================================
           SUPER NUKE: Google Translate Banner Killer
           ========================================================================== */
        iframe.goog-te-banner-frame, 
        .goog-te-banner-frame, 
        .skiptranslate > iframe,
        .VIpgJd-ZVi9od-aZ2wEe-wOHMyf {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
        }
        
        html, body { top: 0px !important; margin-top: 0px !important; position: relative !important; }
        #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }

        .goog-te-gadget-simple {
            background-color: var(--bg-surface) !important;
            border: 1px solid var(--border-color) !important;
            padding: 6px 10px !important;
            border-radius: 25px !important;
            font-size: 0.9rem !important;
            font-family: 'Inter', sans-serif !important;
            display: flex !important;
            align-items: center !important;
        }
        
        .goog-te-gadget-simple span { color: var(--text-main) !important; }
        .goog-te-gadget-icon { display: none !important; }

        /* ==========================================================================
           Designer Highlight & Page Specific Styles
           ========================================================================== */
        .designer-highlight {
            color: var(--accent-color);
            font-weight: 800;
            letter-spacing: 1px;
            background: rgba(230, 126, 34, 0.15);
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .designer-highlight:hover {
            background: var(--accent-color);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(230, 126, 34, 0.3);
        }

        .page-header {
            background: linear-gradient(rgba(39, 174, 96, 0.9), rgba(44, 62, 80, 0.9)), url('https://images.unsplash.com/photo-1592982537447-6f296cb30f02?auto=format&fit=crop&w=1920&q=80') center/cover;
            color: white;
            text-align: center;
            padding: 60px 20px;
            margin-bottom: 2rem;
        }

        .page-header h1 { font-size: 2.5rem; margin-bottom: 10px; }

        .details-container {
            max-width: 1000px;
            margin: 0 auto 4rem auto;
            padding: 0 20px;
        }

        .crop-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            background-color: var(--bg-surface);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .crop-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 400px;
        }

        .crop-content {
            padding: 2.5rem;
        }

        .crop-content h2 { color: var(--primary-dark); font-size: 2rem; margin-bottom: 10px; }
        .season-badge {
            display: inline-block;
            background-color: rgba(46, 204, 113, 0.1);
            color: var(--primary-dark);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .crop-desc { color: var(--text-muted); margin-bottom: 25px; line-height: 1.7; font-size: 1.05rem; }

        .requirement-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .req-box {
            background-color: var(--bg-primary);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .req-box span { display: block; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
        .req-box strong { color: var(--text-main); font-size: 1.1rem; }

        .btn-back {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: var(--transition);
        }
        .btn-back:hover { background-color: var(--primary-dark); }

        .error-msg { text-align: center; padding: 50px; }
        .error-msg h2 { color: var(--accent-color); margin-bottom: 15px; }

        @media (max-width: 768px) {
            .crop-layout { grid-template-columns: 1fr; }
            .crop-image-wrapper img { height: 300px; min-height: auto; }
            .requirement-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="index.html" class="logo">🌱 AgroSystem</a>
            <button class="menu-toggle" id="menuToggle">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="crops.html" class="active">Crops</a></li>
                <li><a href="area-statistics.html">Area Stats</a></li>
                <li><a href="disease.html">Pest & Disease</a></li>
                <li><a href="fertilizer.html">Fertilizers</a></li>
                <li><a href="schemes.html">Schemes</a></li>
                <li><button class="btn-theme" id="themeToggle">🌙 Mode</button></li>
                
                <li style="display: flex; align-items: center;">
                    <div id="google_translate_element"></div>
                </li>
            </ul>
        </nav>
    </header>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en', 
                includedLanguages: 'hi,mr,pa,gu,bn,te,ta,kn,en', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <section class="page-header" id="dynamicHeader">
        <h1>Crop Details</h1>
        <p>Complete cultivation guide and requirements.</p>
    </section>

    <div class="details-container" id="cropDetailContainer">
        <!-- Content will be injected here by JS -->
    </div>

    <!-- VIROXA Brand Footer -->
    <footer>
        <p>&copy; 2026 Daily Farming Management System. Designed by <span class="designer-highlight">"VIROXA"</span></p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // Google Translate Nuke Fallback
        setInterval(function() {
            document.body.style.top = "0px";
            let googleBanner = document.querySelector('.skiptranslate iframe');
            if(googleBanner) {
                googleBanner.style.display = 'none';
                googleBanner.style.visibility = 'hidden';
            }
        }, 500);

        // Crop Database
        const cropData = {
            "wheat": {
                name: "Wheat (Gehun)",
                season: "Rabi (Winter)",
                image: "https://images.unsplash.com/photo-1586201375761-83865001e8ac?auto=format&fit=crop&w=800&q=80",
                desc: "Wheat is the main food crop, in north and north-western part of the country. This rabi crop requires a cool growing season and a bright sunshine at the time of ripening.",
                temp: "10°C to 25°C",
                rain: "50cm to 75cm",
                soil: "Loam / Clay Loam",
                duration: "120 - 150 Days"
            },
            "rice": {
                name: "Rice (Dhaan)",
                season: "Kharif (Monsoon)",
                image: "https://images.unsplash.com/photo-1599839619722-39751411ea63?auto=format&fit=crop&w=800&q=80",
                desc: "Rice is a staple food for the overwhelming majority of population in India. It is a kharif crop which requires high temperature and high humidity with annual rainfall above 100 cm.",
                temp: "Above 25°C",
                rain: "Above 100cm",
                soil: "Clay / Clay Loam",
                duration: "90 - 150 Days"
            },
            "sugarcane": {
                name: "Sugarcane (Ganna)",
                season: "Cash Crop",
                image: "https://images.unsplash.com/photo-1506465492482-1d5d5904d0af?auto=format&fit=crop&w=800&q=80",
                desc: "Sugarcane is a tropical as well as a subtropical crop. It grows well in hot and humid climate. It can be grown on a variety of soils and needs manual labour from sowing to harvesting.",
                temp: "21°C to 27°C",
                rain: "75cm to 100cm",
                soil: "Deep Rich Loamy",
                duration: "10 - 18 Months"
            },
            "maize": {
                name: "Maize (Makka)",
                season: "Kharif (Monsoon)",
                image: "https://images.unsplash.com/photo-1601397082121-729094cb02ff?auto=format&fit=crop&w=800&q=80",
                desc: "It is a crop which is used both as food and fodder. It is a kharif crop which requires temperature between 21°C to 27°C and grows well in old alluvial soil.",
                temp: "21°C to 27°C",
                rain: "50cm to 100cm",
                soil: "Old Alluvial Soil",
                duration: "90 - 120 Days"
            },
            "cotton": {
                name: "Cotton (Kapas)",
                season: "Kharif (Monsoon)",
                image: "https://images.unsplash.com/photo-1605000797499-95a51c5269ae?auto=format&fit=crop&w=800&q=80",
                desc: "India is believed to be the original home of the cotton plant. Cotton grows well in drier parts of the black cotton soil of the Deccan plateau.",
                temp: "21°C to 30°C",
                rain: "50cm to 100cm",
                soil: "Black Soil",
                duration: "210 Frost-free Days"
            },
            "mustard": {
                name: "Mustard (Sarson)",
                season: "Rabi (Winter)",
                image: "https://images.unsplash.com/photo-1629853900293-8758c0e97298?auto=format&fit=crop&w=800&q=80",
                desc: "Mustard is an important oilseed crop. It requires a cool and dry weather and a fair supply of soil moisture during the growing period.",
                temp: "10°C to 25°C",
                rain: "25cm to 40cm",
                soil: "Loamy Soil",
                duration: "110 - 140 Days"
            }
        };

        // Extract Crop ID from URL (e.g., crop-details.html?crop=wheat)
        const urlParams = new URLSearchParams(window.location.search);
        const cropId = urlParams.get('crop');
        const container = document.getElementById('cropDetailContainer');

        if (cropId && cropData[cropId]) {
            const data = cropData[cropId];
            
            // Dynamic Header Update
            document.getElementById('dynamicHeader').innerHTML = `
                <h1>${data.name} Cultivation</h1>
                <p>Complete farming guide and environmental requirements.</p>
            `;

            // Inject Crop HTML
            container.innerHTML = `
                <div class="crop-layout">
                    <div class="crop-image-wrapper">
                        <img src="${data.image}" alt="${data.name}">
                    </div>
                    <div class="crop-content">
                        <h2>${data.name}</h2>
                        <span class="season-badge">${data.season}</span>
                        <p class="crop-desc">${data.desc}</p>
                        
                        <div class="requirement-grid">
                            <div class="req-box">
                                <span>🌡️ Temperature</span>
                                <strong>${data.temp}</strong>
                            </div>
                            <div class="req-box">
                                <span>🌧️ Rainfall</span>
                                <strong>${data.rain}</strong>
                            </div>
                            <div class="req-box">
                                <span>🌍 Best Soil</span>
                                <strong>${data.soil}</strong>
                            </div>
                            <div class="req-box">
                                <span>⏳ Duration</span>
                                <strong>${data.duration}</strong>
                            </div>
                        </div>

                        <a href="crops.html" class="btn-back">⬅ Back to Crop Library</a>
                    </div>
                </div>
            `;
        } else {
            // Error Handling if crop not found
            container.innerHTML = `
                <div class="error-msg">
                    <h2>Crop Not Found!</h2>
                    <p style="color: var(--text-muted); margin-bottom: 20px;">The crop you are looking for does not exist in our database.</p>
                    <a href="crops.html" class="btn-back">Browse All Crops</a>
                </div>
            `;
        }
    </script>
</body>
</html>
